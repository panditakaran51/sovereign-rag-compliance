server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    gzip         on;
    gzip_vary    on;
    gzip_types   text/plain text/css application/javascript application/json;

    # Proxy /api/* to FastAPI, stripping the /api prefix.
    # The trailing slash in proxy_pass causes nginx to rewrite:
    #   /api/health        → http://backend:8000/health
    #   /api/query/stream  → http://backend:8000/query/stream
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE requires buffering disabled so tokens reach the browser immediately.
        # X-Accel-Buffering: no is also set by FastAPI on the SSE response.
        proxy_buffering            off;
        proxy_cache                off;
        proxy_read_timeout         300s;
        proxy_send_timeout         300s;
        proxy_set_header           Connection '';
        chunked_transfer_encoding  on;
    }

    # SPA routing — non-asset paths serve index.html and React Router handles them.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
