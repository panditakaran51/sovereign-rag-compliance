version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: sovereign-rag-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    # For GPU acceleration (NVIDIA), uncomment:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  qdrant:
    image: qdrant/qdrant:latest
    container_name: sovereign-rag-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"  # gRPC

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sovereign-rag-backend
    env_file: .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      - ollama
      - qdrant
    volumes:
      - ./backend:/app
      - ./docs:/docs:ro  # Read-only access to regulation docs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sovereign-rag-frontend
    env_file: .env
    ports:
      - "8501:8501"
    depends_on:
      - backend

volumes:
  ollama_data:
  qdrant_data:

networks:
  default:
    name: sovereign-rag-network
