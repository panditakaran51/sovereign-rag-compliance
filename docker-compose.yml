# Sovereign RAG Compliance — Docker Compose
#
# All four services run on an internal bridge network; only the frontend
# port is exposed to the host. Ollama and Qdrant are not reachable from
# outside the container network, enforcing the sovereign design.
#
# Quick start:
#   docker compose up -d
#   # Pull models on first run:
#   docker exec -it sovereign-rag-ollama ollama pull nomic-embed-text
#   docker exec -it sovereign-rag-ollama ollama pull qwen3:30b-a3b
#   docker exec -it sovereign-rag-ollama ollama pull qwen3.6:27b
#   # Ingest documents (put PDFs in docs/regulations/ first):
#   docker exec sovereign-rag-backend python scripts/ingest.py --corpus docs/regulations/
#   # Open browser:
#   open http://localhost:3000

version: "3.9"

services:

  ollama:
    image: ollama/ollama:latest
    container_name: sovereign-rag-ollama
    volumes:
      - ollama_models:/root/.ollama   # model weights persist across restarts
    ports:
      - "11434:11434"                 # exposed to host so CLI scripts work
    networks:
      - sovereign-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped
    # Uncomment for NVIDIA GPU passthrough:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  qdrant:
    image: qdrant/qdrant:v1.18.2
    container_name: sovereign-rag-qdrant
    volumes:
      - qdrant_data:/qdrant/storage   # vector index persists
    networks:
      - sovereign-net
    # Not exposed to host — backend is the only consumer
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6333/readyz"]
      interval: 20s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped

  backend:
    build:
      context: .                      # repo root — Dockerfile copies backend/ correctly
      dockerfile: backend/Dockerfile
    container_name: sovereign-rag-backend
    env_file: .env
    environment:
      # Override .env so containers talk to each other by service name, not localhost
      - QDRANT_HOST=qdrant
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - app_data:/app/data            # audit.db + bm25_corpus.json
      - ./docs:/app/docs:ro           # regulation PDFs (gitignored — place locally)
    networks:
      - sovereign-net
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s              # Ollama model load adds latency to first request
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sovereign-rag-frontend
    ports:
      - "3000:80"                    # only externally accessible service
    networks:
      - sovereign-net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

volumes:
  ollama_models:
  qdrant_data:
  app_data:

networks:
  sovereign-net:
    driver: bridge
